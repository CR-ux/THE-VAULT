name: Build Index JSON

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'  # Only trigger when Markdown files are updated

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install

      - name: Run build-index script
        run: |
          node build-index.js  # This will run your indexing script

      - name: Commit and push index.json
        run: |
          git config --local user.email "your-email@example.com"
          git config --local user.name "GitHub Actions"
          git add index.json
          git commit -m "Update index.json"
          git push
